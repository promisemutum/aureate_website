<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aureate Realm - Coming Soon">
    <title>Coming Soon | Aureate Realm</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background: url('./images/landing/background_pc.webp') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(110, 25, 25, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            color: #d4af37;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1s ease-out forwards;
        }

        .coming-soon {
            font-family: 'Times New Roman', Times, serif;
            font-size: 4rem;
            font-weight: 400;
            color: #f5f0e8;
            letter-spacing: 0.3em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            line-height: 1.2;
            opacity: 0;
            animation: bookReveal 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
        }

        .message {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.2rem;
            color: #f5f0e8;
            font-weight: 300;
            letter-spacing: 0.1em;
            line-height: 1.8;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .notify-form {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.9s forwards;
        }

        .notify-form input {
            padding: 1rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.05);
            color: #f5f0e8;
            min-width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }

        .notify-form input::placeholder { color: rgba(245, 240, 232, 0.6); }
        .notify-form input:focus {
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.1);
        }

        .notify-form button {
            padding: 1rem 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .notify-form button:hover {
            background: #d4af37;
            color: #1a1a1a;
            transform: translateY(-2px);
        }

        /* Cross Button Styles */
        .close-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            opacity: 0;
            animation: fadeUp 1s ease-out forwards;
        }

        .close-btn:hover {
            background: #d4af37;
            color: #1a1a1a;
            border-color: #d4af37;
            transform: rotate(90deg); /* Elegant rotation on hover */
        }


        .social-links {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.2s forwards;
        }

        .social-links a {
            color: #f5f0e8;
            text-decoration: none;
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .social-links a:hover {
            opacity: 1;
            color: #d4af37;
            transform: translateY(-3px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bookReveal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .coming-soon { font-size: 2.5rem; letter-spacing: 0.2em; }
            .message { font-size: 1rem; letter-spacing: 0.05em; }
            .notify-form input { min-width: 250px; padding: 0.9rem 1.5rem; }
            .notify-form button { padding: 0.9rem 2rem; }
            .logo { font-size: 1.2rem; margin-bottom: 2rem; }
            .social-links { gap: 1.5rem; margin-top: 2rem; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="container">
        <!-- Cross / Back Button -->
        <button class="close-btn" onclick="window.history.back();" aria-label="Go back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="logo">AUREATE REALM</div>
        <h1 class="coming-soon">Coming Soon</h1>
        <p class="message">
            We are crafting something extraordinary.<br>
            Merchandise will be available soon.
        </p>
        
        <!-- UPDATED FORM WITH WEB3FORMS -->
        <form class="notify-form" id="notifyForm" action="https://api.web3forms.com/submit" method="POST">
            <!-- Your Web3Forms Access Key -->
            <input type="hidden" name="access_key" value="4e31db4a-668b-4cec-9aa6-3398a29eac1d">
            <!-- Customizes the subject line of the email you receive -->
            <input type="hidden" name="subject" value="New Aureate Realm Subscriber">
            
            <!-- The email input (name="email" is required for Web3Forms) -->
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>
        
        <div class="social-links">
            <a href="https://www.instagram.com/aureate_realm/" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
    </div>

    <!-- JAVASCRIPT TO HANDLE FORM SUBMISSION -->
    <script>
        document.getElementById('notifyForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Stops the page from reloading
            
            // Gather the form data
            const formData = new FormData(this);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            try {
                // Send the data to Web3Forms in the background
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: json
                });

                const result = await response.json();
                
                if (result.success) {
                    alert('Thank you. You will be notified.');
                    this.reset(); // Clears the email input field
                } else {
                    alert('Something went wrong. Please try again.');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
