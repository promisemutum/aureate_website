<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUREATEREALM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0ede8;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #e8e4dd;
            border-bottom: 1px solid #d0cdc6;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-dots {
            display: flex;
            gap: 4px;
            padding: 4px;
        }

        .menu-dots span {
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
        }

        .logo-box {
            width: 48px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .top-bar-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 16px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .products-link {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .globe-icon {
            width: 18px;
            height: 18px;
            border: 1.5px solid #888;
            border-radius: 50%;
            position: relative;
            display: inline-block;
        }

        .globe-icon::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            border-left: 1.5px solid #888;
            border-right: 1.5px solid #888;
            border-radius: 50%;
        }

        .globe-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 1px;
            transform: translateY(-50%);
            width: 14px;
            height: 1px;
            background: #888;
        }

        /* Hero */
        .hero {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            min-height: 250px;
            max-height: 70vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }

        .hero-title {
            font-size: 42px;
            font-weight: 700;
            color: rgb(255, 157, 0);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.7;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: #e8e4dd;
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Middle */
        .middle-section {
            background: linear-gradient(135deg, #d8d0c8, #e8ddd5, #ddd5cc);
            padding: 60px 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap;
            overflow-x: hidden;
            width: 100%;
        }

        .reel-wrapper {
            padding: 0 60px;
            /* Accommodate the negative margin overlap */
            box-sizing: border-box;
        }

        .reel-container {
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .video-thumb {
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            transition: width 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), margin 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), z-index 0s linear 0.1s;
        }

        .video-thumb:hover .thumb-image {
            transform: scale(1.02);
        }

        .thumb-image {
            transition: transform 0.3s ease;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .thumb-image img {
            width: 100%;
            display: block;
        }

        .thumb-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.6));
            border-radius: 4px;
        }

        .play-icon {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 5px 0 5px 9px;
            border-color: transparent transparent transparent #fff;
            margin-left: 2px;
        }

        .thumb-title {
            position: absolute;
            bottom: 40px;
            left: 10px;
            font-weight: 700;
            font-size: 22px;
            color: #e8a838;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .thumb-views {
            position: absolute;
            bottom: 12px;
            left: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #fff;
            font-weight: 500;
        }

        /* Initial State: All thumbs */
        .video-thumb {
            width: 250px;
            z-index: 1;
        }

        /* Create overlap for every thumb after the first */
        .video-thumb~.video-thumb {
            margin-left: -50px;
        }

        /* Active State: Enlarge and bring to front */
        .video-thumb.active {
            width: 280px;
            z-index: 2;
        }

        .pagination-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            pointer-events: none;
        }

        .pagination-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #bbb;
            cursor: pointer;
            pointer-events: auto;
        }

        .pagination-dots span.active {
            background: #888;
        }

        .about-reel-card {
            width: 320px;
            height: 480px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 30px;
            position: relative;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .reel-info-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: #e8a838 transparent;
        }

        .reel-info-content::-webkit-scrollbar {
            width: 4px;
        }

        .reel-info-content::-webkit-scrollbar-thumb {
            background: #e8a838;
            border-radius: 10px;
        }

        .card-title {
            font-size: 14px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .reel-info-title {
            font-size: 24px;
            color: #e8a838;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            line-height: 1.2;
        }

        .reel-info-text {
            font-size: 14px;
            color: #ccc;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* Video Modal */
        .video-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-modal.show {
            display: flex;
            opacity: 1;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 500px;
            /* Usually portrait for reels */
            max-height: 90vh;
        }

        .video-container video {
            width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            outline: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #e8a838;
        }

        /* Bottom */
        .bottom-section {
            background: linear-gradient(180deg, #e0e8e4, #e8eee8);
            padding: 40px 30px;
            text-align: center;
            border-top: 1px solid #d0d8d4;
            border-bottom: 1px solid #d0d8d4;
            margin: 0 10px;
            border-radius: 4px;
        }

        .bottom-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            color: #c43838;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 40px;
        }

        .bottom-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            color: #c43838;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 28px;
                letter-spacing: 3px;
            }

            .hero-subtitle {
                font-size: 16px;
                letter-spacing: 2px;
            }

            .middle-section {
                flex-direction: column;
                align-items: center;
                padding: 30px 15px;
                gap: 30px;
            }

            .reel-wrapper {
                padding: 0 20px;
            }

            .video-thumb {
                width: 140px;
            }

            .video-thumb~.video-thumb {
                margin-left: -55px;
            }

            .video-thumb.active {
                width: 160px;
            }

            .about-reel-card {
                width: 100%;
                max-width: 320px;
                height: 220px;
            }

            .bottom-description {
                font-size: 48px;
                letter-spacing: 4px;
            }

            .nav-links {
                gap: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div class="menu-dots"><span></span><span></span><span></span></div>
            <div class="logo-box">
                <img src="images/icon.PNG" alt="Aureate Realm Logo">
            </div>
        </div>
        <div class="top-bar-right">
            <div class="nav-links">
                <a href="#about">ABOUT</a>
                <a href="#contact">CONTACT</a>
            </div>
            <div class="products-link">
                <span class="globe-icon"></span>
                <span>PRODUCTS</span>
            </div>
        </div>
    </div>

    <section class="hero">
        <img class="hero-image" src="https://images.unsplash.com/photo-1467991521834-fb8e202c7074?w=1200&h=600&fit=crop"
            alt="Vintage CRT television on road">
        <div class="hero-content">
            <h1 class="hero-title">AUREATEREALM</h1>
            <p class="hero-subtitle">START YOUR JOURNEY</p>
        </div>
    </section>

    <!-- Middle Section -->
    <section class="middle-section">
        <div class="reel-wrapper">
            <div class="reel-container" id="reelContainer">
                <div class="video-thumb">
                    <div class="thumb-image">
                        <img src="https://images.unsplash.com/photo-1482539259217-f31001045448?w=400&h=300&fit=crop"
                            alt="Red neon signage on glass wall">
                        <div class="thumb-overlay"></div>
                        <div class="play-icon"></div>
                        <div class="thumb-views">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            260K
                        </div>
                    </div>
                </div>
                <div class="video-thumb active">
                    <div class="thumb-image">
                        <img src="https://images.unsplash.com/photo-1588363735885-5d784368d0d0?w=400&h=300&fit=crop"
                            alt="White and red food truck on road during night time">
                        <div class="thumb-overlay"></div>
                        <div class="play-icon"></div>
                        <div class="thumb-views">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            67K
                        </div>
                    </div>
                </div>
                <div class="video-thumb">
                    <div class="thumb-image">
                        <img src="images/example/example_pc.jpeg" alt="Example display pc" style="object-fit: cover;">
                        <div class="thumb-overlay"></div>
                        <div class="play-icon"></div>
                        <div class="thumb-views">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            10K
                        </div>
                    </div>
                </div>
            </div>
            <div class="pagination-dots">
                <span class="active"></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="about-reel-card">
            <div class="card-title">ABOUT REEL</div>
            <div class="reel-info-content">
                <h3 class="reel-info-title" id="reelInfoTitle">THE ART OF KEEP GOING</h3>
                <p class="reel-info-text" id="reelInfoText">
                    Loading description...
                </p>
            </div>
        </div>
    </section>

    <!-- Bottom Section -->
    <section class="bottom-section">
        <h2 class="bottom-title">ABOUT AUREATEREALM</h2>
        <p class="bottom-description">DESCRIPTION</p>
    </section>

    <!-- Video Modal -->
    <div id="videoModal" class="video-modal">
        <span class="close-modal">&times;</span>
        <div class="video-container">
            <video id="modalVideo" controls autoplay>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        const reelContainer = document.getElementById('reelContainer');
        const thumbs = Array.from(reelContainer.querySelectorAll('.video-thumb'));
        const dots = document.querySelectorAll('.pagination-dots span');
        const infoTitle = document.getElementById('reelInfoTitle');
        const infoText = document.getElementById('reelInfoText');

        const descriptions = [
            {
                title: "THE ART OF KEEP GOING",
                text: "The reel \"The Art of Keep Going\" by Aureate Realm is designed as a cinematic manifesto for the modern striver. Its primary motive is to bridge the gap between initial ambition and long-term achievement by reframing the \"middle\" of any journey—often the most difficult and unrewarding part—as a period of high-level craftsmanship. Rather than focusing on the euphoria of a win, the reel aims to validate the silent, repetitive work that occurs when the spotlight is off and the applause has died down.\n\nUltimately, the reel is intended to be a source of \"steady-state\" inspiration. Unlike high-energy content meant to give you a temporary adrenaline spike, \"The Art of Keep Going\" is meant to provide a lasting mental framework. Its motive is to leave the viewer with a sense of calm resolve, encouraging them to return to their work with the understanding that the act of simply not stopping is, in itself, a form of mastery and a \"realm\" of success few ever reach."
            },
            {
                title: "BURDEN OF DREAMS",
                text: "This reel serves as a visceral intersection between the polished philosophy of the Aureate Realm and the harrowing reality of Les Blank’s \"Burden of Dreams.\"\n\nThe motive behind this reel is to challenge the viewer’s definition of \"persistence.\" While the Aureate Realm teaches us the beauty of showing up when the excitement has faded, Burden of Dreams shows what happens when that consistency is tested by plane crashes, illness, and the unforgiving laws of nature. It asks a profound question: Where does the noble pursuit of a dream end, and the \"burden\" of obsession begin? By framing Herzog’s struggle to haul a 320-ton steamship over a mountain as the ultimate \"Aureate\" ritual, the reel elevates the concept of \"keeping going\" from a lifestyle habit to a monumental battle of human will against the universe."
            }
        ];

        function setActiveItem(index) {
            thumbs.forEach(t => t.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));

            thumbs[index].classList.add('active');
            if (dots[index]) dots[index].classList.add('active');

            // Update the description card
            if (descriptions[index]) {
                infoTitle.textContent = descriptions[index].title;
                infoText.textContent = descriptions[index].text;
                document.querySelector('.about-reel-card').style.opacity = "1";
            } else {
                infoTitle.textContent = "AUREATE REALM";
                infoText.textContent = "Description";
            }

            // Reset scroll position when content changes
            document.querySelector('.reel-info-content').scrollTop = 0;
        }

        // Initialize with first item
        setActiveItem(0);

        function cycleReel(direction = 1) {
            const activeIndex = thumbs.findIndex(t => t.classList.contains('active'));
            let nextIndex = (activeIndex + direction) % thumbs.length;
            if (nextIndex < 0) nextIndex = thumbs.length - 1;
            setActiveItem(nextIndex);
        }

        const videoSources = [
            "media/reel1.MP4",
            "media/reel2.MP4",
            "media/reel3.MP4"
        ];

        const videoModal = document.getElementById('videoModal');
        const modalVideo = document.getElementById('modalVideo');
        const closeModal = document.querySelector('.close-modal');

        function openVideoModal(index) {
            if (videoSources[index]) {
                modalVideo.src = videoSources[index];
                videoModal.classList.add('show');
                modalVideo.play().catch(e => console.log('Autoplay prevented', e));
            }
        }

        function closeVideoModal() {
            videoModal.classList.remove('show');
            modalVideo.pause();
            modalVideo.src = "";
        }

        closeModal.addEventListener('click', closeVideoModal);
        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) closeVideoModal();
        });

        // Smart Interaction: Clicking the active thumb plays video; clicking inactive thumb makes it active.
        reelContainer.addEventListener('click', (e) => {
            if (e.target.closest('.pagination-dots')) return;

            const clickedThumb = e.target.closest('.video-thumb');
            const activeIndex = thumbs.findIndex(t => t.classList.contains('active'));

            if (clickedThumb && clickedThumb.classList.contains('active')) {
                // Play video if the clicked thumb is already at the front
                openVideoModal(activeIndex);
            } else if (clickedThumb) {
                // Bring clicked thumb to the front
                const clickedIndex = thumbs.indexOf(clickedThumb);
                setActiveItem(clickedIndex);
            } else {
                // Clicked elsewhere, just cycle
                cycleReel(1);
            }
        });

        // Mobile Swipe Support
        let touchStartX = 0;
        let touchEndX = 0;

        reelContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        reelContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 40; // minimum distance to be considered a swipe
            if (touchEndX < touchStartX - swipeThreshold) {
                // Swiped Left -> Next
                cycleReel(1);
            } else if (touchEndX > touchStartX + swipeThreshold) {
                // Swiped Right -> Previous
                cycleReel(-1);
            }
        }

        // Pagination dots interaction
        dots.forEach((dot, idx) => {
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                setActiveItem(idx);
            });
        });
    </script>
</body>

</html>
