<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aureate Realm - Secure Checkout">
    <title>Checkout | Aureate Realm</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: url('./images/landing/background_pc.webp') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem 1rem;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(110, 25, 25, 0.85);
            backdrop-filter: blur(6px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.2rem;
            color: #d4af37;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.1s forwards;
        }

        .title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.5rem;
            font-weight: 400;
            color: #f5f0e8;
            letter-spacing: 0.15em;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
        }

        .payment-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            text-align: left;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.4s forwards;
        }

        /* Cross Button */
        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .close-btn:hover {
            background: #d4af37;
            color: #1a1a1a;
            border-color: #d4af37;
            transform: rotate(90deg);
        }

        .order-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        .order-summary .item {
            color: #f5f0e8;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .order-summary .amount {
            color: #d4af37;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: rgba(245, 240, 232, 0.5);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab:hover { color: rgba(245, 240, 232, 0.8); }
        
        .tab.active {
            color: #d4af37;
            border-bottom-color: #d4af37;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-content.active { display: block; }

        .paypal-desc {
            color: rgba(245, 240, 232, 0.7);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.8rem;
            text-align: center;
        }

        /* Payment button wrapper — centers the embedded buttons */
        .payment-btn-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        /* Override Instamojo button styles to match gold theme 
        .payment-btn-wrap a[data-store-name="aureaterealmstore"],
        .payment-btn-wrap .im-checkout-btn,
        .payment-btn-wrap a.im-checkout-btn {
            background: transparent !important;
            color: #d4af37 !important;
            border: 1px solid #d4af37 !important;
            border-radius: 0 !important;
            width: 100% !important;
            max-width: 320px !important;
            padding: 1.1rem !important;
            font-family: 'Inter', sans-serif !important;
            font-size: 0.95rem !important;
            font-weight: 400 !important;
            letter-spacing: 0.2em !important;
            text-transform: uppercase !important;
            transition: all 0.3s ease !important;
            text-decoration: none !important;
            display: inline-block !important;
            text-align: center !important;
        }

        .payment-btn-wrap a[data-store-name="aureaterealmstore"]:hover,
        .payment-btn-wrap .im-checkout-btn:hover {
            background: #d4af37 !important;
            color: #1a1a1a !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }
        */

        /* Override Payhip button styles to match gold theme */
        .payment-btn-wrap a.payhip-buy-button,
        .payment-btn-wrap .payhip-buy-button {
            background: transparent !important;
            color: #d4af37 !important;
            border: 1px solid #d4af37 !important;
            border-radius: 0 !important;
            width: 100% !important;
            max-width: 320px !important;
            padding: 1.1rem !important;
            font-family: 'Inter', sans-serif !important;
            font-size: 0.95rem !important;
            font-weight: 400 !important;
            letter-spacing: 0.2em !important;
            text-transform: uppercase !important;
            transition: all 0.3s ease !important;
            text-decoration: none !important;
            display: inline-block !important;
            text-align: center !important;
            box-shadow: none !important;
        }

        .payment-btn-wrap a.payhip-buy-button:hover,
        .payment-btn-wrap .payhip-buy-button:hover {
            background: #d4af37 !important;
            color: #1a1a1a !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2) !important;
        }

        .secure-note {
            text-align: center;
            margin-top: 2rem;
            color: rgba(245, 240, 232, 0.4);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .title { font-size: 1.8rem; letter-spacing: 0.1em; }
            .payment-card { padding: 1.5rem; }
            .order-summary .amount { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="container">
        <div class="logo">AUREATE REALM</div>
        <h1 class="title">Checkout</h1>

        <div class="payment-card">
            <!-- Cross / Back Button -->
            <button class="close-btn" onclick="window.history.back();" aria-label="Go back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="tabs">
                <!-- <button class="tab active" data-tab="upi">UPI Payment</button> -->
                <button class="tab active" data-tab="paypal">PayPal</button>
            </div>

            <!-- PayPal Tab — Payhip -->
            <div class="tab-content active" id="paypal">
                <div class="order-summary">
                    <span class="item">Purchase Now</span>
                    <span class="amount">$9.99</span>
                </div>
                <p class="paypal-desc">
                    You will be securely redirected to PayPal to complete your transaction.
                </p>
                <div class="payment-btn-wrap">
                    <a href="https://payhip.com/b/f6OTQ"
                       class="payhip-buy-button"
                       data-theme="neutral"
                       data-product="f6OTQ">
                       Proceed with PayPal
                    </a>
                </div>
            </div>

            <!-- UPI Tab — Instamojo
            <div class="tab-content active" id="upi">
                <div class="order-summary">
                    <span class="item">Purchase Now</span>
                    <span class="amount">Rs 1,000</span>
                </div>
                <p class="paypal-desc">
                    You will be securely redirected to our payment partner to complete your UPI transaction.
                </p>
                <div class="payment-btn-wrap">
                <a href="https://aureaterealmstore.myinstamojo.com/product/the-aureate-doctrine/" data-store-name="aureaterealmstore" data-domain="https://aureaterealmstore.myinstamojo.com" data-id="7194193" rel="im-new-checkout" data-text="UPI" data-css-style="background:#000000; color:#ffffff; width:300px; border-radius:30px" data-image="https://storeassets.im-cdn.com/media-manager/aureaterealmstore/Z1kMrFe8RdOkoc3pUgum_cover.PNG"  data-layout="vertical"  ></a>
                <script src="https://manage.instamojo.com/assets/js/pay_button/button.min.js"></script>
                </div>
            </div> -->
        </div>

        <p class="secure-note">Encrypted Secure Payment</p>
    </div>

    <!-- Payment Gateway Scripts -->
    <!-- <script src="https://manage.instamojo.com/assets/js/pay_button/button.min.js"></script> -->
    <script type="text/javascript" src="https://payhip.com/payhip.js"></script>

    <script>
        // Tab Switching Logic
        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
    </script>
</body>
</html>
