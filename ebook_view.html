<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureate Doctrine</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
            background-color: #0d1117;
            /* Fallback dark color */
        }

        /* Background Image Styling */
        .seascape-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* URL of the generated seascape */
            background-image: url('./images/ebook/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        /* Book Container */
        .book-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
            /* Hidden by default (Desktop) */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            gap: 1.5rem;
            /* Consistent spacing between all elements */
            padding: 2rem;
        }

        .book-img {
            max-width: 65%;
            max-height: 65%;
            opacity: 0;
            /* Start invisible for animation */
            transform: scale(0.8);
        }

        .book-text {
            font-family: 'Cinzel', serif;
            color: #f1d279;
            /* Gold-ish color to match Aureate theme */
            font-size: 1.8rem;
            font-weight: 700;
            opacity: 0;
            text-shadow: 0 0 15px rgba(241, 210, 121, 0.4);
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
        }

        .book-subtext {
            font-family: 'Montserrat', sans-serif;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0;
            max-width: 90%;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .read-button {
            margin-top: 0.5rem;
            padding: 12px 35px;
            background-color: #f1d279;
            color: #0d1117;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            border-radius: 5px;
            /* Sleeker, less rounded look */
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: auto;
            /* Enable interaction */
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(241, 210, 121, 0.2);
            border: none;
            cursor: pointer;
        }

        .read-button:hover {
            background-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .scroll-down {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f1d279;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: auto;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(241, 210, 121, 0.4);
            transition: color 0.3s ease;
        }

        .scroll-down:hover {
            color: #ffffff;
        }

        .scroll-down .arrow {
            width: 16px;
            height: 16px;
            border-bottom: 2px solid currentColor;
            border-right: 2px solid currentColor;
            transform: rotate(45deg);
            margin-top: 8px;
            animation: bounceArrow 2s infinite;
        }

        .previews-container {
            position: relative;
            z-index: 10;
            display: none;
            /* Hidden by default (Desktop) */
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 40px 20px 80px 20px;
            background-color: rgba(13, 17, 23, 0.7);
            /* Subtle dark overlay */
            backdrop-filter: blur(10px);
        }

        .preview-img {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(241, 210, 121, 0.2);
        }

        /* Animation Definition */
        @keyframes fadeInText {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(-40px);
                /* Move up with icon */
            }
        }

        @keyframes fadeInSubtext {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(-40px);
                /* Move up with icon */
            }
        }

        @keyframes fadeInButton {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(-40px);
                /* Move up with icon */
            }
        }

        @keyframes fadeInArrow {
            from {
                opacity: 0;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-40px);
                /* Move up with icon */
            }
        }

        @keyframes bounceArrow {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0) rotate(45deg);
            }

            40% {
                transform: translateY(-8px) rotate(45deg);
            }

            60% {
                transform: translateY(-4px) rotate(45deg);
            }
        }

        @keyframes slowAppear {

            /* Phase 1: Slowly Appear (0% to 50%) */
            0% {
                opacity: 0;
                transform: scale(0.85);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }

            /* Phase 2: Hold briefly (50% to 70%) */
            70% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            /* Phase 3: Move Up and Smaller (70% to 100%) */
            100% {
                opacity: 1;
                transform: scale(0.6) translateY(-40px);
            }
        }

        /* Mobile Media Query */
        @media only screen and (max-width: 768px) {
            .book-container {
                display: flex;
                position: relative;
                /* Override fixed to allow scrolling */
                height: 100vh;
                width: 100vw;
            }

            .previews-container {
                display: flex;
            }

            .book-img {
                /* Apply the slow appearing animation */
                animation: slowAppear 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                animation-delay: 0.5s;
                /* Slight delay before starting */
            }

            .book-text {
                animation: fadeInText 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                animation-delay: 2.5s;
                /* Starts as icon animation is finishing */
            }

            .book-subtext {
                animation: fadeInSubtext 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                animation-delay: 2.8s;
            }

            .read-button {
                animation: fadeInButton 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                animation-delay: 3s;
                /* Appears last */
            }

            .scroll-down {
                animation: fadeInArrow 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                animation-delay: 3.5s;
                /* Appears after button */
            }
        }
    </style>
</head>

<body>

    <!-- Background Layer -->
    <div class="seascape-bg"></div>

    <!-- Book Overlay (Mobile Only) -->
    <div class="book-container">
        <!-- URL of the generated book -->
        <img src="./images/ebook/bookicon.PNG" alt="Aureate Doctrine" class="book-img">
        <div class="book-text">Aureate Doctrine</div>
        <div class="book-subtext">Step into a world where clarity replaces chaos, and your truest self finally speaks
            louder than the noise around you.</div>
        <a href="#" class="read-button">READ EBOOK</a>
        <div class="scroll-down" onclick="document.getElementById('previews').scrollIntoView({behavior: 'smooth'})">
            <span>Read About</span>
            <div class="arrow"></div>
        </div>
    </div>

    <!-- Previews Section (Mobile Only) -->
    <div id="previews" class="previews-container">
        <img src="./images/ebook/preview1.jpeg" class="preview-img" alt="Preview 1">
        <img src="./images/ebook/preview2.png" class="preview-img" alt="Preview 2">
        <img src="./images/ebook/preview3.png" class="preview-img" alt="Preview 3">
        <img src="./images/ebook/preview4.jpeg" class="preview-img" alt="Preview 4">
    </div>

</body>

</html>
