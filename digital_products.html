<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Products – Aureate Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b0b;
            font-family: 'Inter', sans-serif;
        }

        .hero-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .section {
            height: 100%;
            flex-shrink: 0;
            transform: scale(1.08);
            filter: brightness(0.5);
            animation: popIn 0.5s ease-out forwards;
        }

        .section img {
            display: block;
            height: 100%;
            width: auto;
        }

        .section-1 {
            animation-delay: 0.3s;
        }

        .section-2 {
            animation-delay: 0.15s;
        }

        .section-3 {
            animation-delay: 0s;
        }

        @keyframes popIn {
            0% {
                transform: scale(1.08);
                filter: brightness(0.5);
            }

            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }

        .download-btn {
            position: fixed;
            top: 50%;
            left: 16%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 50vw;
            max-width: 350px;
            min-width: 200px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease, filter 0.3s ease;
        }

        .download-btn:hover {
            transform: translate(-50%, -50%) scale(0.98);
            filter: brightness(1.2);
        }

        .download-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
            transition-duration: 0.05s;
        }

        .download-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .download-btn {
                left: 50%;
                top: 85%;
                width: 110px;
            }
        }
    </style>
</head>

<body>
    <a href="#" class="download-btn">
        <img src="./images/ebook/book.webp" alt="Download">
    </a>

    <div class="hero-container">
        <div class="section section-1">
            <img src="./images/ebook/1.webp" alt="Section 1">
        </div>

        <div class="section section-2">
            <img src="./images/ebook/2.webp" alt="Section 2">
        </div>

        <div class="section section-3">
            <img src="./images/ebook/3.webp" alt="Section 3">
        </div>
    </div>

    <audio id="click-sound" src="sound/click.wav" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('.download-btn');
            const sound = document.getElementById('click-sound');

            if (btn && sound) {
                const playSound = (e) => {
                    // Reset and play
                    sound.currentTime = 0;
                    sound.play().catch(err => console.log('Audio play failed:', err));
                };

                btn.addEventListener('click', playSound);
                // Also trigger for touch devices for faster response
                btn.addEventListener('touchstart', playSound, { passive: true });
            }
        });
    </script>
</body>

</html>
