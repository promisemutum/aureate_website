<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Products – Aureate Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b0b;
            font-family: 'Inter', sans-serif;
        }

        .hero-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .section {
            height: 100%;
            flex-shrink: 0;
            transform: scale(1.08);
            filter: brightness(0.5);
            animation: popIn 0.5s ease-out forwards;
        }

        .section img {
            display: block;
            height: 100%;
            width: auto;
        }

        .section-1 {
            animation-delay: 0.3s;
        }

        .section-2 {
            animation-delay: 0.15s;
        }

        .section-3 {
            animation-delay: 0s;
        }

        @keyframes popIn {
            0% {
                transform: scale(1.08);
                filter: brightness(0.5);
            }

            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }

        @keyframes yellowGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 10px rgba(255, 210, 50, 0.5)) drop-shadow(0 0 22px rgba(255, 175, 0, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 22px rgba(255, 220, 60, 0.85)) drop-shadow(0 0 45px rgba(255, 160, 0, 0.55));
            }
        }

        .download-btn {
            position: fixed;
            top: 50%;
            left: 15%;
            transform: translate(-50%, -50%) scale(1.15);
            z-index: 100;
            width: 40vw;
            max-width: 310px;
            min-width: 20px;
            aspect-ratio: 1 / 1;
            opacity: 0;
            animation:
                fadeInIcon 0.6s ease-out both 0.4s;
            transition:
                transform 0.22s cubic-bezier(0.25, 1, 0.5, 1),
                filter 0.22s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .download-btn.instant-glow {
            animation:
                fadeInIcon 0.6s ease-out both 0.4s,
                yellowGlow 2.4s ease-in-out infinite 0.4s;
        }

        .download-btn:hover {
            transform: translate(-50%, calc(-50% - 8px)) scale(1.16);
            filter:
                drop-shadow(0 0 28px rgba(255, 220, 60, 1)) drop-shadow(0 0 55px rgba(255, 160, 0, 0.7));
            animation-play-state: paused;
        }

        .download-btn:active {
            transform: translate(-50%, calc(-50% + 4px)) scale(0.93);
            filter:
                drop-shadow(0 0 14px rgba(255, 200, 40, 0.9)) drop-shadow(0 0 30px rgba(255, 140, 0, 0.6));
            transition-duration: 0.08s;
        }

        .download-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        @keyframes fadeInIcon {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.15);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @media (max-width: 768px) {
            .download-btn {
                left: 50%;
                top: 85%;
                width: 110px;
                transform: translate(-50%, -50%) scale(1.15);
            }

            .download-btn:hover {
                transform: translate(-50%, calc(-50% - 6px)) scale(1.16);
            }

            .download-btn:active {
                transform: translate(-50%, calc(-50% + 3px)) scale(0.93);
            }

            @keyframes fadeInIcon {
                from {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(1.15);
                }

                to {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
            }
        }
    </style>
</head>

<body>
    <div class="download-btn instant-glow" role="img" aria-label="Download button">
        <img src="./images/ebook/book.webp" alt="">
    </div>

    <div class="hero-container">
        <div class="section section-1">
            <img src="./images/ebook/1.webp" alt="Section 1">
        </div>

        <div class="section section-2">
            <img src="./images/ebook/2.webp" alt="Section 2">
        </div>

        <div class="section section-3">
            <img src="./images/ebook/3.webp" alt="Section 3">
        </div>
    </div>
</body>

</html>
