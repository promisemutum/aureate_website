<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Products – Aureate Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b0b;
            font-family: 'Inter', sans-serif;
        }

        .hero-container {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            /* Pack to the right side of the screen */
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .section {
            height: 100%;
            flex-shrink: 0;
            transform: scale(1.08);
            filter: brightness(0.5);
            animation: popIn 0.5s ease-out forwards;
        }

        .section img {
            display: block;
            height: 100%;
            width: auto;
            /* Proportional natural width to match 100% height */
        }

        /* Section 1 slides in LAST */
        .section-1 {
            animation-delay: 0.3s;
        }

        /* Section 2 slides in SECOND */
        .section-2 {
            animation-delay: 0.15s;
        }

        /* Section 3 slides in FIRST */
        .section-3 {
            animation-delay: 0s;
        }

        @keyframes popIn {
            0% {
                transform: scale(1.08);
                filter: brightness(0.5);
            }

            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }
    </style>
</head>

<body>
    <div class="hero-container">
        <!-- Flex items packed to the right side -->
        <!-- Div order matters: 1 is left-most, 3 is right-most -->
        <div class="section section-1">
            <img src="./images/ebook/1.webp" alt="Section 1">
        </div>

        <div class="section section-2">
            <img src="./images/ebook/2.webp" alt="Section 2">
        </div>

        <div class="section section-3">
            <img src="./images/ebook/3.webp" alt="Section 3">
        </div>
    </div>
</body>

</html>
